            showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const colors = { success: 'bg-success-600', error: 'bg-danger-600', warning: 'bg-warning-600', info: 'bg-primary-600' };
                const icons = { success: 'check-circle', error: 'times-circle', warning: 'exclamation-circle', info: 'info-circle' };

                const toast = document.createElement('div');
                toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg ${colors[type]} text-white shadow-lg min-w-[300px]`;
                toast.innerHTML = `
                    <i class="fas fa-${icons[type]}"></i>
                    <span class="text-sm font-medium">${message}</span>
                    <button onclick="this.parentElement.remove()" class="ml-auto text-white/70 hover:text-white">
                        <i class="fas fa-times"></i>
                    </button>
                `;

                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.transition = 'all 0.3s ease';
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },

            deleteLead(id) { this.showToast('Lead deleted', 'warning'); },
            toggleUserMenu() { this.showToast('User menu opened', 'info'); },

            startRealtimeUpdates() {
                setInterval(() => {
                    const badge = document.getElementById('leadBadge');
                    if (badge && Math.random() > 0.95) {
                        const current = parseInt(badge.textContent);
                        badge.textContent = current + 1;
                        this.showToast('New lead captured from website', 'info');
                    }
                }, 10000);
            }
